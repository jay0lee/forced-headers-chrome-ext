<!DOCTYPE html>
<html>
<head>
  <title>Forced Headers - Admin Testing Options</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 20px; max-width: 800px; }
    #status-banner { padding: 10px; margin-bottom: 20px; border-radius: 4px; display: none; }
    .managed-active { background-color: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
    .rule-row { display: flex; gap: 10px; margin-bottom: 10px; align-items: flex-start; }
    .rule-row input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; flex: 1; }
    .rule-row input.domains { flex: 2; }
    button { padding: 8px 12px; cursor: pointer; border-radius: 4px; border: none; font-weight: bold; }
    .btn-add { background-color: #28a745; color: white; }
    .btn-remove { background-color: #dc3545; color: white; }
    .btn-save { background-color: #007bff; color: white; margin-top: 10px; }
    .btn-export { background-color: #6c757d; color: white; margin-top: 10px; margin-left: 10px; }
    .controls { margin-top: 20px; border-top: 1px solid #eee; padding-top: 20px; }
  </style>
</head>
<body>
  <h2>Forced Headers Tester</h2>
  
  <div id="status-banner"></div>

  <p>Configure headers to test locally. Use comma-separated values for domains (e.g., <i>login.microsoft.com, login.live.com</i>).</p>

  <div id="rules-container">
    <!-- Rule rows generated by JS -->
  </div>

  <div class="controls">
    <button id="add-rule" class="btn-add">+ Add Header</button><br><br>
    <button id="save-rules" class="btn-save">Save & Apply Local Rules</button>
    <button id="export-rules" class="btn-export">Export to Policy JSON</button>
    <span id="save-message" style="margin-left: 10px; color: green;"></span>
  </div>

  <script src="options.js"></script>
</body>
</html>
